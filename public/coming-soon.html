<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Churrasqueira do Chapita — Em breve</title>
  <meta name="description" content="Churrasqueira do Chapita — Em breve">
  <link rel="icon" href="/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--accent1:#ff7a2d;--accent2:#ffd199;--text:#fff;--muted:#ffdcb2}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{font-family:Montserrat,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial;color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;background:linear-gradient(180deg, rgba(0,0,0,0.44), rgba(0,0,0,0.66)), url('/hero-grill.png') center/cover no-repeat}
    main{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:env(safe-area-inset-top) 18px env(safe-area-inset-bottom)}
    .card{width:clamp(260px,90%,780px);max-width:780px;padding:clamp(18px,4.5vw,36px);border-radius:14px;text-align:center;background:linear-gradient(180deg, rgba(0,0,0,0.48), rgba(0,0,0,0.32));box-shadow:0 20px 60px rgba(0,0,0,0.6)}
    h1{margin:0 0 10px;font-size:clamp(20px,5vw,40px);line-height:1.05;font-weight:800;letter-spacing:-0.02em}
    p{margin:0 0 18px;color:var(--muted);font-size:clamp(13px,2.6vw,16px)}
    .btn{display:inline-block;padding:14px 20px;border-radius:12px;background:linear-gradient(90deg,var(--accent2),var(--accent1));color:#111;font-weight:700;text-decoration:none;min-width:160px;transition:transform .14s ease,box-shadow .14s ease;box-shadow:0 8px 24px rgba(255,122,45,0.18)}
    .btn:active{transform:translateY(1px)}
    @media (max-width:420px){.btn{padding:14px 18px;min-width:140px}h1{font-size:24px}p{font-size:14px}.card{padding:18px;border-radius:12px}}
  </style>
</head>
<body>
  <main role="main">
    <section class="card" aria-labelledby="titulo">
      <h1 id="titulo">Churrasqueira do Chapita</h1>
      <p>Estamos a preparar as brasas — abrimos em breve.</p>
      <a class="btn" href="https://www.google.com/maps/place/Churrasqueira+do+Chapita/@39.5856305,-9.0229519,164m/data=!3m1!1e3!4m15!1m8!3m7!1s0xd18a8863e71ea59:0xda9534df95ef8dc3!2sR.+dos+Lavradores+23,+2450-335+Valado+dos+Frades!3b1!8m2!3d39.585652!4d-9.0228697!16s%2Fg%2F11rp3b969b!3m5!1s0xd18a9b3e0e6a123:0xc8eb075787ec0253!8m2!3d39.585652!4d-9.0228697!16s%2Fg%2F11f7s4dhtg?entry=ttu&g_ep=EgoyMDI2MDQxMy4wIKXMDSoASAFQAw%3D%3D" target="_blank" rel="noopener">Ver no mapa</a>
    </section>
  </main>
</body>
</html>
